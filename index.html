<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fisicando - Quiz de Física Gamificado</title>
    <meta name="description" content="Domine a Física de forma divertida com desafios inspirados no estilo Duolingo. Para alunos da 7ª à 9ª classe!" />
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; text-align: center; padding: 20px;">
        <div id="loading-fallback">
          <h2 style="color: #4b4b4b;">A carregar o Fisicando...</h2>
          <p style="color: #afafaf;">Se esta tela não desaparecer em 5 segundos, verifique se publicou a pasta "dist" ou o branch correto.</p>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
    <script>
      // Esconder o fallback se o React carregar
      window.addEventListener('load', function() {
        setTimeout(function() {
          var root = document.getElementById('root');
          if (root && root.innerHTML.includes('A carregar')) {
            console.warn('React failed to mount.');
          }
        }, 5000);
      });
    </script>
  </body>
</html>
